<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PS Coach — Coaching Dashboard</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

    :root {
      --bg:      #0d0f1a;
      --surface: #161928;
      --card:    #1e2235;
      --border:  #2a2f4a;
      --accent:  #6c8efb;
      --green:   #4ade80;
      --yellow:  #facc15;
      --red:     #f87171;
      --text:    #e2e8f0;
      --muted:   #64748b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    header { text-align: center; margin-bottom: 2.5rem; }
    header h1 {
      font-size: 1.75rem; font-weight: 700;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    
    .status-panel {
      width: 100%; max-width: 900px;
      margin-bottom: 2rem;
      text-align: center;
    }
    
    #feedback-board {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 3rem 1.5rem;
      font-size: 2rem;
      font-weight: 600;
      transition: all 0.3s;
      min-height: 150px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .c-green { color: var(--green); text-shadow: 0 0 10px rgba(74, 222, 128, 0.3); border-color: var(--green) !important; }
    .c-yellow { color: var(--yellow); text-shadow: 0 0 10px rgba(250, 204, 21, 0.3); border-color: var(--yellow) !important; }
    .c-red { color: var(--red); text-shadow: 0 0 10px rgba(248, 113, 113, 0.3); border-color: var(--red) !important; }

    .controls { display: flex; gap: 1rem; margin-bottom: 2rem; justify-content: center; }
    button {
      font-family: 'Inter', sans-serif; font-size: 0.9rem; font-weight: 600;
      padding: 0.65rem 1.75rem; border: none; border-radius: 10px; cursor: pointer;
    }
    #btn-start { background: linear-gradient(135deg, var(--accent), #a78bfa); color: #fff; }
    #btn-stop  { background: var(--red); color: #fff; }

    /* Advanced View */
    #advanced-view { display: none; width: 100%; max-width: 900px; gap: 1rem; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; }
    .card-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 0.75rem; }
    .metric-value { font-family: 'JetBrains Mono', monospace; font-size: 2rem; font-weight: 600; }

    /* Graph Panel */
    #graph-panel {
      width: 100%; max-width: 900px;
      margin-top: 2rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
    }
    #graph-panel .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    #graph-panel .panel-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
    }
    #graph-legend {
      display: flex;
      gap: 1.25rem;
      flex-wrap: wrap;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.72rem;
      color: var(--text);
    }
    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    #graph-canvas {
      width: 100%;
      height: 260px;
      display: block;
      border-radius: 8px;
      background: var(--surface);
    }
    #graph-btn-clear {
      font-size: 0.72rem;
      padding: 0.35rem 0.9rem;
      border-radius: 8px;
      background: var(--border);
      color: var(--muted);
      cursor: pointer;
      border: none;
      font-family: 'Inter', sans-serif;
      transition: background 0.2s;
    }
    #graph-btn-clear:hover { background: var(--accent); color: #fff; }
  </style>
</head>
<body>

<header>
  <h1>🎙️ PS Coach</h1>
  <p>Real-time behavioral feedback engine</p>
</header>

<div class="controls">
  <button id="btn-start">▶ Start Microphone</button>
  <button id="btn-stop" disabled>⏹ Stop</button>
  <div style="display:flex;align-items:center;margin-left:1rem;">
    <input type="checkbox" id="toggle-advanced"> <label for="toggle-advanced" style="font-size:0.8rem;color:var(--muted);margin-left:8px;">Show Advanced</label>
  </div>
</div>

<div class="status-panel">
  <div id="feedback-board">Press Start to Begin</div>
</div>

<div id="advanced-view">
  <div class="card">
    <div class="card-label">Pitch (F0)</div>
    <div class="metric-value" id="val-f0">—</div>
    <div style="font-size:0.8rem;color:var(--muted);margin-top:0.4rem">Hz</div>
  </div>
  <div class="card">
    <div class="card-label">Pitch Variance (CV)</div>
    <div class="metric-value" id="val-cv">—</div>
    <div style="font-size:0.8rem;color:var(--muted);margin-top:0.4rem">coefficient of variation</div>
  </div>
  <div class="card">
    <div class="card-label">RMS (Loudness)</div>
    <div class="metric-value" id="val-rms">—</div>
    <div style="font-size:0.8rem;color:var(--muted);margin-top:0.4rem">raw amplitude</div>
  </div>
  <div class="card">
    <div class="card-label">Voice Activity</div>
    <div class="metric-value" id="val-vad">—</div>
  </div>
</div>

<!-- Real-time Graph Panel -->
<div id="graph-panel">
  <div class="panel-header">
    <span class="panel-title">📈 Real-time Metrics Graph</span>
    <div style="display:flex;align-items:center;gap:1rem;">
      <div id="graph-legend">
        <div class="legend-item"><div class="legend-dot" style="background:#6c8efb"></div>Pitch F0 (Hz)</div>
        <div class="legend-item"><div class="legend-dot" style="background:#4ade80"></div>RMS (×1000)</div>
        <div class="legend-item"><div class="legend-dot" style="background:#facc15"></div>Pitch CV (×100)</div>
        <div class="legend-item"><div class="legend-dot" style="background:#f87171"></div>VAD (0/100)</div>
      </div>
      <button id="graph-btn-clear">Clear</button>
    </div>
  </div>
  <canvas id="graph-canvas"></canvas>
</div>

<script>
  /* ── Graph Setup ──────────────────────────────────────────── */
  const canvas  = document.getElementById('graph-canvas');
  const gctx    = canvas.getContext('2d');
  const MAX_PTS = 300;   // rolling window of 300 samples

  // Circular buffers for each metric
  const graphData = {
    f0:  [],   // raw Hz
    rms: [],   // raw amplitude (will be scaled ×1000 for display)
    cv:  [],   // coefficient of variation (will be scaled ×100)
    vad: [],   // 0 or 100
  };

  // Per-metric display config
  const SERIES = [
    { key: 'f0',  color: '#6c8efb', label: 'Pitch F0',  scale: v => v,        min: 0, max: 400  },
    { key: 'rms', color: '#4ade80', label: 'RMS',        scale: v => v * 1000, min: 0, max: 60   },
    { key: 'cv',  color: '#facc15', label: 'Pitch CV',   scale: v => v * 100,  min: 0, max: 40   },
    { key: 'vad', color: '#f87171', label: 'VAD',        scale: v => v,        min: 0, max: 100  },
  ];

  // Latest CV value produced by processMetrics
  let latestCV = null;

  function resizeCanvas() {
    canvas.width  = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', () => { resizeCanvas(); drawGraph(); });

  function pushGraphPoint(f0, rms, isVoiced, cv) {
    graphData.f0.push(f0 > 0 ? f0 : 0);
    graphData.rms.push(rms);
    graphData.cv.push(cv !== null ? cv : 0);
    graphData.vad.push(isVoiced ? 100 : 0);
    for (const key of Object.keys(graphData)) {
      if (graphData[key].length > MAX_PTS) graphData[key].shift();
    }
  }

  function drawGraph() {
    const W = canvas.width;
    const H = canvas.height;
    const PAD_L = 8, PAD_R = 8, PAD_T = 18, PAD_B = 28;
    const plotW = W - PAD_L - PAD_R;
    const plotH = H - PAD_T - PAD_B;

    gctx.clearRect(0, 0, W, H);

    // Background grid
    gctx.strokeStyle = 'rgba(255,255,255,0.04)';
    gctx.lineWidth   = 1;
    const gridLines = 5;
    for (let i = 0; i <= gridLines; i++) {
      const y = PAD_T + (plotH / gridLines) * i;
      gctx.beginPath();
      gctx.moveTo(PAD_L, y);
      gctx.lineTo(W - PAD_R, y);
      gctx.stroke();
    }

    const totalPts = graphData.f0.length;
    if (totalPts < 2) return;

    // Draw each series
    for (const s of SERIES) {
      const buf = graphData[s.key];
      const span = s.max - s.min;

      gctx.beginPath();
      gctx.strokeStyle = s.color;
      gctx.lineWidth   = 2;
      gctx.lineJoin    = 'round';
      gctx.shadowColor = s.color;
      gctx.shadowBlur  = 4;

      for (let i = 0; i < buf.length; i++) {
        const x = PAD_L + (i / (MAX_PTS - 1)) * plotW;
        const scaled = s.scale(buf[i]);
        const norm   = Math.min(Math.max((scaled - s.min) / span, 0), 1);
        const y = PAD_T + plotH * (1 - norm);
        if (i === 0) gctx.moveTo(x, y); else gctx.lineTo(x, y);
      }
      gctx.stroke();
      gctx.shadowBlur = 0;

      // Value label at the tip
      if (buf.length > 0) {
        const tipX = PAD_L + ((buf.length - 1) / (MAX_PTS - 1)) * plotW;
        const last = s.scale(buf[buf.length - 1]);
        const normLast = Math.min(Math.max((last - s.min) / s.max, 0), 1);
        const tipY = PAD_T + plotH * (1 - normLast) - 6;
        gctx.fillStyle = s.color;
        gctx.font = 'bold 10px JetBrains Mono, monospace';
        gctx.textAlign = 'left';
        const displayVal = last.toFixed(last < 10 ? 2 : 0);
        gctx.fillText(displayVal, Math.min(tipX + 4, W - PAD_R - 36), Math.max(tipY, PAD_T + 10));
      }
    }

    // Time axis labels
    gctx.fillStyle   = 'rgba(100,116,139,0.8)';
    gctx.font        = '10px Inter, sans-serif';
    gctx.textAlign   = 'left';
    gctx.fillText('oldest', PAD_L, H - 8);
    gctx.textAlign = 'right';
    gctx.fillText('now', W - PAD_R, H - 8);
  }

  document.getElementById('graph-btn-clear').addEventListener('click', () => {
    for (const key of Object.keys(graphData)) graphData[key] = [];
    latestCV = null;
    gctx.clearRect(0, 0, canvas.width, canvas.height);
  });
  /* ────────────────────────────────────────────────────────── */

  let audioCtx, workletNode, mediaStream, streamSource;
  const btnStart = document.getElementById('btn-start');
  const btnStop = document.getElementById('btn-stop');
  const feedbackBoard = document.getElementById('feedback-board');
  
  document.getElementById('toggle-advanced').addEventListener('change', (e) => {
    document.getElementById('advanced-view').style.display = e.target.checked ? 'grid' : 'none';
  });

  // Windows
  const shortWindowCV = [];
  
  // Feedback Cooldown
  let currentFeedbackTime = 0;
  let sentenceDropCount = 0;

  function setFeedback(msg, severity) {
    const now = Date.now();
    // 2.5s cooldown unless it's a critical red override directly after a green/yellow
    if (now - currentFeedbackTime < 2500 && severity !== 'red') return;
    
    feedbackBoard.textContent = msg;
    feedbackBoard.className = `c-${severity}`;
    currentFeedbackTime = now;
  }

  async function loadEssentiaWorklet(audioCtx) {
    // Load directly via ES module support in AudioWorklet
    await audioCtx.audioWorklet.addModule('./essentia_worklet.js');
  }

  btnStart.addEventListener('click', async () => {
    try {
      feedbackBoard.textContent = "Loading Engine...";
      feedbackBoard.className = "c-yellow";
      
      mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      audioCtx = new AudioContext();
      
      await loadEssentiaWorklet(audioCtx);
      workletNode = new AudioWorkletNode(audioCtx, 'coach-processor');

      // Setup 5-sec calibration phase
      setFeedback("Speak naturally so we can calibrate your voice...", "yellow");
      workletNode.port.postMessage({ type: 'START_CALIBRATION' });
      
      setTimeout(() => {
        workletNode.port.postMessage({ type: 'FINISH_CALIBRATION' });
      }, 5000);

      workletNode.port.onmessage = (e) => {
        const data = e.data;
        if (data.type === 'CALIBRATION_DONE') {
          // If stdDev is huge absolutely (not relatively), warn the user, but we will pass them anyway.
          if (data.stdDevRms > 0.1) {
            setFeedback("Warning: Noisy environment detected during calibration.", "yellow");
          } else {
            setFeedback("Calibration Complete. Ready to coach!", "green");
          }
          sentenceDropCount = 0;
        } else if (data.type === 'METRICS') {
            processMetrics(data);
        }
      };

      streamSource = audioCtx.createMediaStreamSource(mediaStream);
      streamSource.connect(workletNode);

      btnStart.disabled = true;
      btnStop.disabled = false;
      
    } catch (err) {
      console.error(err);
      feedbackBoard.textContent = "Error: " + err.message;
      feedbackBoard.className = "c-red";
    }
  });
  
  function processMetrics(data) {
    document.getElementById('val-rms').textContent = data.rms.toFixed(4);
    document.getElementById('val-vad').textContent = data.isVoiced ? '🔴 Voiced' : '⚫ Silence';
    document.getElementById('val-f0').textContent  = data.f0 > 0 ? data.f0.toFixed(1) : '—';
    
    // Accumulate CV
    if (data.f0 > 0 && data.isVoiced) {
        shortWindowCV.push(data.f0);
        if (shortWindowCV.length > 50) shortWindowCV.shift(); // ~5s at 100ms interval
    }
    
    // Evaluate Data
    if (data.sentenceDrop) {
        sentenceDropCount++;
        if (sentenceDropCount >= 3) {
            setFeedback("Finish your sentences stronger.", "red");
            sentenceDropCount = 0;
        }
    }
    
    if (shortWindowCV.length > 10) {
        let sum = 0;
        for (let v of shortWindowCV) sum += v;
        const mean = sum / shortWindowCV.length;
        
        let sumSq = 0;
        for (let v of shortWindowCV) sumSq += (v - mean) ** 2;
        const variance = sumSq / shortWindowCV.length;
        const stdDev = Math.sqrt(variance);
        
        // Guard against instability at low pitch
        let cv = null;
        if (mean >= 80) {
            cv = stdDev / mean;
            document.getElementById('val-cv').textContent = cv.toFixed(3);
        }
        
        // Trigger generic coaching feedback based on CV if ready
        if (cv !== null) {
            latestCV = cv;
            if (cv < 0.10) {
                setFeedback("You sound monotone. Try varying your pitch.", "red");
            } else if (cv >= 0.10 && cv <= 0.20) {
                setFeedback("Good pitch variation.", "green");
            } else if (cv > 0.20) {
                setFeedback("Very expressive delivery!", "green");
            }
        }
    }

    // ── Update graph ──
    pushGraphPoint(data.f0, data.rms, data.isVoiced, latestCV);
    drawGraph();
  }

  btnStop.addEventListener('click', () => {
    if (streamSource) { streamSource.disconnect(); streamSource = null; }
    if (workletNode)  { workletNode.disconnect();  workletNode  = null; }
    if (audioCtx)     { audioCtx.close();          audioCtx     = null; }
    if (mediaStream)  { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
    
    btnStart.disabled = false;
    btnStop.disabled = true;
    
    feedbackBoard.textContent = "Session Stopped";
    feedbackBoard.className = "";
  });
</script>

</body>
</html>
